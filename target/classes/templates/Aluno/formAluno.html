<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
    <title>Cadastro de Alunos</title>
</head>
<body>
    <div th:replace="fragmentos/fragmentos :: cabecalho"></div>
    <div class="container" style="margin-top: 20px;">
        <h4>Cadastro de Aluno</h4>
        <hr>
        <form method="post" th:action="@{/InsertAlunos}" th:object="${aluno}">
            
            <div class="row">
                <div class="col-md-6 offset-md-3">
                    <label>Nome:</label>
                    <input class="form-control" th:field="*{nome}">
                    <span class="text-danger" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                    
                    <label class="mt-2">Email:</label>
                    <input class="form-control" th:field="*{email}">
                    <span class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>

                    <label class="mt-2">Nota ENADE:</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{notaEnade}">

                    <label class="mt-2">Curso:</label>
                    <select class="form-control" th:field="*{curso}">
                        <option th:each="c : ${T(br.com.gerenciamento.enums.Curso).values()}" th:value="${c}" th:text="${c}"></option>
                    </select>

                    <label class="mt-2">Matrícula:</label>
                    <input class="form-control" id="matricula" th:field="*{matricula}" readonly>
                    <button type="button" onclick="GerarMatricula();" class="btn btn-primary btn-sm mt-1">Gerar</button>

                    <label class="mt-2">Turno:</label>
                    <select class="form-control" th:field="*{turno}">
                        <option th:each="t : ${T(br.com.gerenciamento.enums.Turno).values()}" th:value="${t}" th:text="${t}"></option>
                    </select>

                    <label class="mt-2">Status:</label>
                    <select class="form-control" th:field="*{status}">
                        <option th:each="s : ${T(br.com.gerenciamento.enums.Status).values()}" th:value="${s}" th:text="${s}"></option>
                    </select>

                    <div class="mt-4 text-center">
                        <button type="submit" class="btn btn-success">Salvar</button>
                        <a th:href="@{/index}" class="btn btn-danger">Voltar</a>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <script src="/js/main.js"></script>
</body>
</html>
