<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    
    <title>Sistema de Gerenciamento de Alunos</title>
    <meta name="author" content="Bruno">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.2/font/bootstrap-icons.css">
    <script src="https://kit.fontawesome.com/006642858d.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">
</head>
<body>

    <div th:replace="fragmentos/fragmentos :: cabecalho"></div>

    <section class="neo-section" style="background-image: url('img/bg-index.jpg');">
        <div class="sombra"></div>

        <div class="center neo-container">
            <h1 class="texto-centro">Sistema de Gerenciamento de Alunos</h1>

            <div class="botoes">
                <div class="wm">
                    <a th:href="@{/inserirAlunos}" class="btn-index">CADASTRAR ALUNO</a>
                </div>

                <div class="wm">
                    <button type="button" class="btn-index justify-content-center" data-toggle="modal" data-target="#modalPesquisa">
                        ENCONTRAR ALUNO
                    </button>
                </div>

                <div class="wm">
                    <a th:href="@{/calcular-media}" class="btn-index justify-content-center" style="background-color: #17a2b8; border-color: #17a2b8; color: white; text-decoration: none;">
                        <i class="fa-solid fa-calculator"></i> MÉDIA ENADE
                    </a>
                </div>

                <div class="clear"></div>
            </div>

            <div th:if="${mediaEnade != null}" class="alert alert-info text-center mt-4 mx-auto" style="max-width: 600px; border-radius: 10px; background-color: rgba(23, 162, 184, 0.9); color: white; border: none; z-index: 10; position: relative;">
                <h4>
                    <i class="fa-solid fa-graduation-cap"></i> Média ENADE (Alunos Ativos): 
                    <strong th:text="${#numbers.formatDecimal(mediaEnade, 1, 2)}">0.00</strong>
                </h4>
            </div>

        </div>
    </section>

    <div class="modal fade" id="modalPesquisa" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Encontre um Aluno</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <form method="post" th:action="@{/pesquisar-aluno}">
                    <div class="modal-body">
                        <div class="form-group">
                            <label for="nome">Nome do Aluno:</label>
                            <input type="text" name="nome" id="nome" class="form-control" placeholder="Digite o nome para buscar...">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Fechar</button>
                        <button type="submit" class="btn btn-success">Pesquisar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="fragmentos/fragmentos :: rodape"></div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
