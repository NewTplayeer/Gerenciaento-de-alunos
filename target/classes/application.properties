# ===============================
# DATASOURCE (Conexão com Banco)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/academyspring?useTimezone=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de Conexão e Validação
spring.datasource.testWhileIdle=true
spring.datasource.validationQuery=SELECT 1

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# 'update' cria as tabelas se não existirem e altera se houver mudanças na Entity
spring.jpa.hibernate.ddl-auto=update

# Dialeto: Se estiver usando MySQL 8+, o dialeto abaixo é o mais recomendado
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
# Desativar cache em desenvolvimento permite ver mudanças no HTML sem reiniciar o app
spring.thymeleaf.cache=false

# ===============================
# EXIBIÇÃO DE LOGS (Opcional)
# ===============================
# Útil para ver os parâmetros que estão sendo enviados nas queries SQL
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE